<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
text-align:center;
overflow:hidden;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4b6e;
color:white;
cursor:pointer;
}

#letter{
display:none;
background:white;
padding:40px;
border-radius:20px;
width:70%;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.heart{
position:fixed;
top:-10px;
color:red;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div id="start">
<h1>Click this ❤️</h1>
<button onclick="openLetter()">Open</button>
</div>

<div id="letter">
<h2>My Love Letter 💌</h2>
<p id="text"></p>
</div>

<audio id="music" autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>

function openLetter(){
document.getElementById("start").style.display="none";
document.getElementById("letter").style.display="block";
typeWriter();
}

var message="Hi love. I made this small website just for you. Kahit simple lang, gusto kong ipakita sayo na special ka sa akin. No matter what happens, ikaw at ikaw pa rin ang pipiliin ko. I love you. ❤️";

var i=0;

function typeWriter(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter,50);
}
}

function hearts(){
var heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(hearts,300);

</script>

</body>
</html>
